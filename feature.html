<!DOCTYPE html>
<html>
<head>
    <title>Color Switcher</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: #111;
            color: white;
            transition: 0.5s;
        }

        h1 {
            margin-top: 50px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h1>Color Switcher</h1>
    <p>Click the button to change background color</p>

    <button onclick="changeColor()">Change Color</button>

    <script>
        function changeColor() {
            const colors = ["#1abc9c", "#3498db", "#9b59b6", "#e74c3c", "#f1c40f"];
            const random = colors[Math.floor(Math.random() * colors.length)];
            document.body.style.backgroundColor = random;
        }
    </script>

</body>
</html>
